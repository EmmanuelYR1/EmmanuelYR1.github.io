<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramienta de Captura Avanzada - IA</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-anim"></div>
    <div class="glass-container">
        <header>
            <h1>Captura Activa</h1>
            <p>Selecciona la pestaña independiente (o pantalla web) que deseas registrar para análisis.</p>
        </header>
        
        <main>
            <div class="controls">
                <button id="startBtn" class="btn primary-btn">
                    <span class="icon">📷</span> Seleccionar Pestaña para Capturar
                </button>
                <button id="snapBtn" class="btn secondary-btn" disabled>
                    <span class="icon">📸</span> Extraer Imagen
                </button>
            </div>

            <div class="preview-container">
                <video id="videoPreview" autoplay playsinline muted></video>
                <p id="statusText">Esperando permisos para iniciar...</p>
            </div>
            
            <div class="result-container" id="resultContainer" style="display: none;">
                <h3>Resultado de la Captura:</h3>
                <img id="captureResult" alt="Captura procesada" />
                <button class="btn send-btn" id="sendAiBtn"><span class="icon">🤖</span> Enviar a Inteligencia Artificial</button>
            </div>
            
            <canvas id="canvasHidden" style="display: none;"></canvas>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
